<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AssignmentBar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1c1c1e;
    --surface: #2c2c2e;
    --border: rgba(255,255,255,0.10);
    --text: #f2f2f7;
    --subtext: #8e8e93;
    --accent: #0a84ff;
    --radius: 12px;
  }

  html, body {
    width: 340px;
    height: 480px;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    font-size: 13px;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  #app {
    width: 340px;
    height: 480px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55);
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #header-icon {
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  #header-icon svg { display: block; }

  #title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  #count-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 5px;
  }

  #close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--subtext);
    padding: 0; margin-left: 4px;
    display: flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }
  #close-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  /* ── Add Form ── */
  #form {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #name-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  #name-input::placeholder { color: var(--subtext); }
  #name-input:focus { border-color: var(--accent); }

  #date-row {
    display: flex;
    gap: 6px;
  }

  #date-input, #time-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
    transition: border-color 0.15s;
    color-scheme: dark;
  }
  #date-input { flex: 1; }
  #time-input { width: 82px; }
  #date-input:focus, #time-input:focus { border-color: var(--accent); }

  #bottom-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #colour-row {
    display: flex;
    gap: 5px;
    flex: 1;
  }

  .colour-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.12s, transform 0.12s;
    flex-shrink: 0;
  }
  .colour-dot:hover { transform: scale(1.15); }
  .colour-dot.selected { border-color: rgba(255,255,255,0.75); }

  #add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  #add-btn:hover { opacity: 0.85; }
  #add-btn:active { opacity: 0.7; }

  /* ── List ── */
  #list-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #list-wrap::-webkit-scrollbar { width: 4px; }
  #list-wrap::-webkit-scrollbar-track { background: transparent; }
  #list-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--subtext);
    padding: 6px 14px 4px;
  }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 12px 6px;
  }

  .empty-hint {
    text-align: center;
    color: var(--subtext);
    font-size: 12px;
    padding: 24px 0;
  }

  /* ── Row ── */
  .row {
    display: flex;
    align-items: center;
    padding: 8px 12px 8px 0;
    margin: 1px 8px;
    border-radius: 8px;
    position: relative;
    cursor: default;
    transition: background 0.12s;
    gap: 0;
  }
  .row:hover { background: rgba(255,255,255,0.05); }
  .row:hover .del-btn { opacity: 1; }

  .accent-bar {
    width: 3px;
    height: 34px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-right: 10px;
    margin-left: 10px;
  }

  .row-body {
    flex: 1;
    min-width: 0;
  }

  .row-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-name.overdue-text {
    text-decoration: line-through;
    color: var(--subtext);
  }

  .row-due {
    font-size: 11px;
    color: var(--subtext);
    margin-top: 2px;
  }

  .countdown {
    font-size: 11px;
    font-weight: 600;
    border-radius: 5px;
    padding: 2px 6px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-right: 4px;
  }
  .countdown.green  { background: rgba(48,209,88,0.18);  color: #30d158; }
  .countdown.yellow { background: rgba(255,214,10,0.18); color: #ffd60a; }
  .countdown.red    { background: rgba(255,69,58,0.18);  color: #ff453a; }

  .del-btn {
    background: none; border: none;
    color: var(--subtext); cursor: pointer;
    opacity: 0; transition: opacity 0.12s, color 0.12s;
    padding: 2px 4px; border-radius: 4px;
    font-size: 14px; line-height: 1;
    flex-shrink: 0;
  }
  .del-btn:hover { color: #ff453a; }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="header-icon">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="0.5" width="10" height="11" rx="1.5" stroke="white" stroke-width="1.2"/>
        <line x1="3.5" y1="3.5" x2="8.5" y2="3.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
        <line x1="3.5" y1="6" x2="8.5" y2="6" stroke="white" stroke-width="1" stroke-linecap="round"/>
        <line x1="3.5" y1="8.5" x2="6.5" y2="8.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <span id="title">Assignments</span>
    <span id="count-badge">0</span>
    <button id="close-btn" title="Close">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Form -->
  <div id="form">
    <input id="name-input" type="text" placeholder="Assignment name…" autocomplete="off" spellcheck="false" />
    <div id="date-row">
      <input id="date-input" type="date" />
      <input id="time-input" type="time" value="23:59" />
    </div>
    <div id="bottom-row">
      <div id="colour-row"></div>
      <button id="add-btn">Add</button>
    </div>
  </div>

  <!-- List -->
  <div id="list-wrap">
    <div id="list"></div>
  </div>
</div>

<script>
(function () {
  const COLOURS = [
    { id: 'blue',   hex: '#0a84ff' },
    { id: 'green',  hex: '#30d158' },
    { id: 'yellow', hex: '#ffd60a' },
    { id: 'red',    hex: '#ff453a' },
    { id: 'purple', hex: '#bf5af2' },
    { id: 'orange', hex: '#ff9f0a' },
  ];

  let assignments = [];
  let selectedColour = COLOURS[0].id;

  // ── Colour dots ──
  const colourRow = document.getElementById('colour-row');
  COLOURS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'colour-dot' + (c.id === selectedColour ? ' selected' : '');
    dot.style.background = c.hex;
    dot.dataset.id = c.id;
    dot.addEventListener('click', () => {
      selectedColour = c.id;
      document.querySelectorAll('.colour-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
    });
    colourRow.appendChild(dot);
  });

  // ── Default date to today ──
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  document.getElementById('date-input').value = todayStr();

  // ── Helpers ──
  function hexForColour(id) {
    return (COLOURS.find(c => c.id === id) || COLOURS[0]).hex;
  }

  function formatDue(isoStr) {
    const due = new Date(isoStr);
    const now = new Date();
    const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const dueMid   = new Date(due.getFullYear(), due.getMonth(), due.getDate());
    const diff = dueMid - todayMid;
    const hhmm = due.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (diff === 0) return `Today at ${hhmm}`;
    if (diff === 86400000) return `Tomorrow at ${hhmm}`;
    const day = due.getDate();
    const mon = due.toLocaleString('default', { month: 'short' });
    return `${day} ${mon} at ${hhmm}`;
  }

  function countdownText(isoStr) {
    const ms = new Date(isoStr) - new Date();
    if (ms < 0) return { text: 'Overdue', cls: 'red' };
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (ms < 3600000) return { text: `${m}m`, cls: 'red' };
    if (ms < 86400000) return { text: `${h}h ${m}m`, cls: 'yellow' };
    const d = Math.floor(ms / 86400000);
    return { text: `${d}d`, cls: 'green' };
  }

  function isOverdue(isoStr) { return new Date(isoStr) < new Date(); }

  // ── Render ──
  function render() {
    const listEl = document.getElementById('list');
    const badge  = document.getElementById('count-badge');

    const upcoming = assignments
      .filter(a => !isOverdue(a.due))
      .sort((a, b) => new Date(a.due) - new Date(b.due));
    const overdue = assignments
      .filter(a => isOverdue(a.due))
      .sort((a, b) => new Date(a.due) - new Date(b.due));

    badge.textContent = upcoming.length;
    listEl.innerHTML = '';

    if (assignments.length === 0) {
      listEl.innerHTML = '<div class="empty-hint">No assignments yet</div>';
      return;
    }

    if (upcoming.length > 0) {
      upcoming.forEach(a => listEl.appendChild(makeRow(a, false)));
    }

    if (overdue.length > 0) {
      if (upcoming.length > 0) {
        const div = document.createElement('div');
        div.className = 'section-divider';
        listEl.appendChild(div);
      }
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = 'Overdue';
      listEl.appendChild(lbl);
      overdue.forEach(a => listEl.appendChild(makeRow(a, true)));
    }
  }

  function makeRow(a, over) {
    const row = document.createElement('div');
    row.className = 'row';

    const bar = document.createElement('div');
    bar.className = 'accent-bar';
    bar.style.background = hexForColour(a.colour);
    row.appendChild(bar);

    const body = document.createElement('div');
    body.className = 'row-body';

    const name = document.createElement('div');
    name.className = 'row-name' + (over ? ' overdue-text' : '');
    name.textContent = a.name;
    body.appendChild(name);

    const due = document.createElement('div');
    due.className = 'row-due';
    due.textContent = formatDue(a.due);
    body.appendChild(due);

    row.appendChild(body);

    const { text, cls } = countdownText(a.due);
    const badge = document.createElement('span');
    badge.className = `countdown ${cls}`;
    badge.textContent = text;
    row.appendChild(badge);

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '×';
    del.title = 'Delete';
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      assignments = assignments.filter(x => x.id !== a.id);
      window.api.saveAssignments(assignments);
      render();
    });
    row.appendChild(del);

    return row;
  }

  // ── Add ──
  function addAssignment() {
    const nameEl = document.getElementById('name-input');
    const dateEl = document.getElementById('date-input');
    const timeEl = document.getElementById('time-input');

    const name = nameEl.value.trim();
    const date = dateEl.value;
    const time = timeEl.value || '23:59';

    if (!name || !date) return;

    const due = `${date}T${time}:00`;
    assignments.push({ id: Date.now().toString(), name, due, colour: selectedColour });
    window.api.saveAssignments(assignments);
    render();

    nameEl.value = '';
    dateEl.value = todayStr();
    timeEl.value = '23:59';
    nameEl.focus();
  }

  document.getElementById('add-btn').addEventListener('click', addAssignment);
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addAssignment();
  });

  // ── Close ──
  document.getElementById('close-btn').addEventListener('click', () => window.api.closeWindow());

  // ── Init ──
  window.api.getAssignments().then(data => {
    assignments = Array.isArray(data) ? data : [];
    render();
  });

  // ── Refresh countdowns ──
  setInterval(render, 30000);
})();
</script>
</body>
</html>
